<html lang="ja">

  <span class="ed-edited" id="ed-edited">Edited</span>

    <span class="ed-dot" id="ed-dot"></span>
    <span id="ed-label">Connect</span>
    <span class="ed-hint" id="ed-hint">(Drop a JSON file)</span>
  </button>

</div>
<div id="root"></div>

<script>
let passthrough={};
let dataRef=null;

function splitData(data){
  const{objects,views,transitions,...rest}=data;
  passthrough=rest;
  // objects マイグレーション: belongs-to → has-many
  const objs=objects||[];
  let migrated=false;
  objs.forEach(e=>{(e.relations||[]).forEach(r=>{if(r.type==='belongs-to'){r.type='has-many';migrated=true;}});});
  if(migrated)setTimeout(()=>io.showToast('belongs-toをhas-manyに自動変換しました'),300);
  return{objects:objs,views:views||[],transitions:transitions||[]};
}

const io=window.__editorIO.createFileIO({
  ids:{toast:'ed-toast',dot:'ed-dot',label:'ed-label',hint:'ed-hint',edited:'ed-edited',autoBtn:'ed-auto-btn',overlay:'ed-drop-overlay'},
  getFullJson(){if(!dataRef)return null;return{...passthrough,objects:dataRef.objects,views:dataRef.views,transitions:dataRef.transitions};},
  onDisconnect(){passthrough={};},
  loadDataKey:'__edLoadData',
  keys:{undo:'__edUndo',redo:'__edRedo',copy:'__edCopy',paste:'__edPaste',cut:'__edCut',del:'__edDelete'},
  filePickerId:'pm-editor',
});
const{showToast,markModified}=io;
function handleConnect(){return io.handleConnect();}
function toggleAuto(){return io.toggleAuto();}
io.setupDragDrop();
io.setupKeyboard();
</script>

el(false);}}} style={{width:"100%",height:"100%",border:"1px solid #1A73E8",borderRadius:8,background:"white",fontSize:11,textAlign:"center",outline:"none",padding:"0 4px",boxSizing:"border-box",fontFamily:"inherit"}}/></foreignObject>;}if(!rel.label&&isRelSel){const pw=labelWidth("label");return<g key={`lb-${ent.id}-${ri}`} onClick={e=>onLabelClick(e,ent.id,rel.id)} style={{cursor:"pointer"}}><rect x={mx-pw/2} y={my-9} width={pw} height={17} rx={8} fill="white" stroke={col} strokeWidth="0.5" opacity="0.5"/><text x={mx} y={my+4} fontSize={11} fill="#C4C7C5" textAnchor="middle" style={{fontStyle:"italic"}}>label</text></g>;}if(!rel.label)return null;const lw=labelWidth(rel.label);return<g key={`lb-${ent.id}-${ri}`} onClick={e=>onLabelClick(e,ent.id,rel.id)} style={{cursor:"pointer"}}><rect x={mx-lw/2} y={my-9} width={lw} height={17} rx={8} fill="white" stroke={col} strokeWidth="0.5" opacity="0.96"/><text x={mx} y={my+4} fontSize={11} fill={col} textAnchor="middle">{rel.label}</text></g>;}))}
          </g>
        </svg>
        <div style={{position:"absolute",top:16,left:16,display:"flex",gap:8,alignItems:"center"}}><Btn small onClick={addObj}>+ Object</Btn><Btn small ghost={!connOn} accent={connOn} onClick={()=>{if(!connOn){setSelId(null);setSelRelId(null);setEditLabel(false);setMultiSel(new Set());multiOffsets.current={};}setConn(connOn?null:"");setConnDrag(null);}}>{connOn?(connHasSrc?"→ select target":"← select source"):<span style={{display:"inline-flex",alignItems:"center",gap:4}}><span className="msi" style={{fontSize:16}}>link</span> Connect</span>}</Btn>{connOn&&<Btn small ghost onClick={()=>{setConn(null);setConnDrag(null);}}><span className="msi" style={{fontSize:16}}>close</span></Btn>}</div>
        <div style={{position:"absolute",bottom:16,right:16,display:"flex",alignItems:"center",gap:4,background:"white",borderRadius:"var(--md-sys-shape-full)",padding:"4px 8px",boxShadow:"var(--md-sys-elevation-1)"}}>
          <button onClick={()=>{const r=svgRef.current?.getBoundingClientRect();if(!r)return;const cx=r.width/2,cy=r.height/2;setZoom(z=>{const nz=Math.max(ZOOM_MIN,z*0.8);const wx=cx/z+pan.x,wy=cy/z+pan.y;setPan({x:wx-cx/nz,y:wy-cy/nz});return nz;});}} style={{width:28,height:28,border:"none",background:"transparent",cursor:"pointer",fontSize:16,color:"#5F6368",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}} onMouseEnter={e=>{e.target.style.background="#F5F5F5";}} onMouseLeave={e=>{e.target.style.background="transparent";}}>−</button>
          <button onClick={()=>{const r=svgRef.current?.getBoundingClientRect();if(!r)return;const cx=r.width/2,cy=r.height/2;setZoom(z=>{const wx=cx/z+pan.x,wy=cy/z+pan.y;setPan({x:wx-cx,y:wy-cy});return 1;});}} style={{minWidth:48,height:28,border:"none",background:"transparent",cursor:"pointer",fontSize:12,fontWeight:500,color:"#5F6368",borderRadius:14,fontFamily:"inherit"}} onMouseEnter={e=>{e.target.style.background="#F5F5F5";}} onMouseLeave={e=>{e.target.style.background="transparent";}}>{Math.round(zoom*100)}%</button>
          <button onClick={()=>{const r=svgRef.current?.getBoundingClientRect();if(!r)return;const cx=r.width/2,cy=r.height/2;setZoom(z=>{const nz=Math.min(ZOOM_MAX,z*1.25);const wx=cx/z+pan.x,wy=cy/z+pan.y;setPan({x:wx-cx/nz,y:wy-cy/nz});return nz;});}} style={{width:28,height:28,border:"none",background:"transparent",cursor:"pointer",fontSize:16,color:"#5F6368",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}} onMouseEnter={e=>{e.target.style.background="#F5F5F5";}} onMouseLeave={e=>{e.target.style.background="transparent";}}>+</button>
        </div>
        {selRelId&&selRel&&(()=>{const owner=ents.find(e=>e.id===selRelId.entId),tgt=ents.find(e=>e.id===selRel.targetId);if(!owner||!tgt)return null;let sx,sy;if(owner.id===tgt.id){sx=(owner.x+EW-SELF_REF_X+SELF_REF_CP-pan.x)*zoom;sy=(owner.y+SELF_REF_Y-20-pan.y)*zoom;}else{const fp=edgePt(owner.x,owner.y,EW,EH,tgt.x+EW/2,tgt.y+EH/2),tp=edgePt(tgt.x,tgt.y,EW,EH,owner.x+EW/2,owner.y+EH/2);sx=((fp.x+tp.x)/2-pan.x)*zoom;sy=((fp.y+tp.y)/2-pan.y)*zoom;}return<div style={{position:"absolute",left:sx,top:sy-48,transform:"translateX(-50%)",background:"white",borderRadius:8,boxShadow:"var(--md-sys-elevation-2)",padding:"4px 6px",zIndex:2}} onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}><select value={selRel.type} onChange={e=>updRelField(selRelId.entId,selRelId.relId,"type",e.target.value)} style={{border:"1px solid #E0E0E0",borderRadius:6,fontSize:12,padding:"2px 4px",background:"white",cursor:"pointer",fontFamily:"inherit"}}>{REL_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>;})()}
